<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="max-w-md w-full bg-white rounded-lg shadow-md p-8">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Iniciar Sesión</h2>

    <p *ngIf="errorMessage" class="bg-red-100 text-red-700 p-3 rounded text-sm text-center mb-4">
      {{ errorMessage }}
    </p>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="flex flex-col">
        <label class="text-sm font-medium text-gray-700 mb-1">Usuario:</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          required
          class="px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
        />
      </div>

      <div class="flex flex-col">
        <label class="text-sm font-medium text-gray-700 mb-1">Contraseña:</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          class="px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 text-white font-medium py-2 px-4 rounded hover:bg-blue-700 transition-colors mt-4"
      >
        Ingresar
      </button>
    </form>
  </div>
</div>
