<div class="min-h-screen flex items-center justify-center px-4">
  <div class="max-w-md w-full bg-gray-800 rounded-lg shadow-xl p-8 border border-gray-700">
    <h2 class="text-2xl font-bold text-center text-gray-100 mb-6">Iniciar Sesión</h2>

    <p
      *ngIf="errorMessage"
      class="bg-red-900 text-red-200 border border-red-700 p-3 rounded text-sm text-center mb-4"
    >
      {{ errorMessage }}
    </p>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="flex flex-col">
        <label class="text-sm font-medium text-gray-300 mb-1">Usuario:</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          required
          class="px-4 py-2 bg-gray-700 border border-gray-600 text-white rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-gray-400"
        />
      </div>

      <div class="flex flex-col">
        <label class="text-sm font-medium text-gray-300 mb-1">Contraseña:</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          class="px-4 py-2 bg-gray-700 border border-gray-600 text-white rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-gray-400"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 text-white font-medium py-2 px-4 rounded hover:bg-blue-500 transition-colors mt-4"
      >
        Ingresar
      </button>
    </form>

    <div class="text-center mt-6 text-sm text-gray-400">
      ¿No tenés cuenta?
      <a
        routerLink="/registro"
        class="text-blue-400 hover:text-blue-300 font-medium transition-colors"
      >
        Registrate acá
      </a>
    </div>
  </div>
</div>
