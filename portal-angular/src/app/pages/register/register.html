<div class="min-h-screen flex items-center justify-center px-4">
  <div class="max-w-md w-full bg-gray-800 rounded-lg shadow-xl p-8 border border-gray-700">
    <h2 class="text-2xl font-bold text-center text-gray-100 mb-6">Crear Cuenta</h2>

    <p
      *ngIf="errorMessage"
      class="bg-red-900 text-red-200 border border-red-700 p-3 rounded text-sm text-center mb-4"
    >
      {{ errorMessage }}
    </p>

    <p
      *ngIf="successMessage"
      class="bg-green-900 text-green-200 border border-green-700 p-3 rounded text-sm text-center mb-4"
    >
      {{ successMessage }}
    </p>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="flex flex-col">
        <label class="text-sm font-medium text-gray-300 mb-1">Nuevo Usuario:</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          required
          [disabled]="isLoading"
          class="px-4 py-2 bg-gray-700 border border-gray-600 text-white rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-gray-400 disabled:opacity-50"
        />
      </div>

      <div class="flex flex-col">
        <label class="text-sm font-medium text-gray-300 mb-1">Contraseña:</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          [disabled]="isLoading"
          class="px-4 py-2 bg-gray-700 border border-gray-600 text-white rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-gray-400 disabled:opacity-50"
        />
      </div>

      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full bg-blue-600 text-white font-medium py-2 px-4 rounded hover:bg-blue-500 transition-colors mt-4 disabled:bg-gray-600 flex items-center justify-center space-x-2"
      >
        <span *ngIf="isLoading">Procesando...</span>
        <span *ngIf="!isLoading">Registrarse</span>
      </button>
    </form>

    <div class="text-center mt-6 text-sm text-gray-400">
      ¿Ya tenes cuenta?
      <a routerLink="/" class="text-blue-400 hover:text-blue-300 font-medium transition-colors">
        Inicia sesión acá
      </a>
    </div>
  </div>
</div>
